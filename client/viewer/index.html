<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer - 3D Scene</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #ui-overlay {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      z-index: 1000;
      min-width: 180px;
    }
    #status { font-weight: bold; margin-bottom: 10px; }
    #data { font-size: 14px; }
    #follow-btn {
      margin-top: 10px;
      padding: 8px 12px;
      background: #4CC3D9;
      color: white;
      border: none;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    #follow-btn:hover { opacity: 0.85; }

    /* Snap flash overlay */
    #snap-flash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(239, 45, 94, 0.25);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 999;
    }
    #snap-flash.active { opacity: 1; }
  </style>
</head>
<body>

  <!-- Flash overlay for snap-to-view feedback -->
  <div id="snap-flash"></div>

  <!-- Enter overlay -->
  <div id="enter-overlay" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); display: flex; align-items: center;
    justify-content: center; z-index: 2000;">
    <button onclick="enterExperience()" style="
      padding: 20px 40px; font-size: 24px; background: #4CC3D9;
      color: white; border: none; border-radius: 12px; cursor: pointer;">
      Enter
    </button>
  </div>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div id="status">Waiting for motion data...</div>
    <div id="data"></div>
    <button id="follow-btn" onclick="toggleFollow()">👁 Following Expert</button>
  </div>

  <!-- A-Frame Scene -->
  <a-scene>
    <a-sky color="#87CEEB"></a-sky>
    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.6" position="2 4 3"></a-light>
    <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>

    <a-entity id="engine" gltf-model="url(/assets/engine.glb)" position="-0.010 1.550 -3" scale="0.010 0.010 0.010" rotation="0 0 0" class="clickable"></a-entity>

    <a-entity id="camera-rig" position="0 1.6 0">
      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-entity>

    <!-- Ghost: shows expert's gaze direction when viewer is exploring freely -->
    <a-entity id="ghost-rig" position="0 3 -1" visible="false">
      <a-sphere color="#4CC3D9" radius="0.08" opacity="0.9"></a-sphere>
      <a-cylinder color="#4CC3D9" opacity="0.7" radius="0.03" height="2" position="0 0 -1" rotation="90 0 0"></a-cylinder>
      <a-cone color="#4CC3D9" opacity="0.9" radius-bottom="0.08" radius-top="0" height="0.2" position="0 0 -2" rotation="90 0 0"></a-cone>
      <a-text value="Expert" align="center" position="0 0.2 0" scale="0.5 0.5 0.5" color="white"></a-text>
    </a-entity>

  </a-scene>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const THREE = AFRAME.THREE;
    const status = document.getElementById('status');
    const dataDiv = document.getElementById('data');
    const snapFlash = document.getElementById('snap-flash');
    let cameraRig = null;
    let ghostRig = null;

    // --- Follow toggle ---
    let followExpert = true;

    function toggleFollow() {
      if (viewLocked) {
        status.textContent = 'View locked by expert — cannot explore freely';
        setTimeout(() => { status.textContent = '📌 View locked by expert'; }, 2000);
        return;
      }
      followExpert = !followExpert;
      const btn = document.getElementById('follow-btn');
      if (followExpert) {
        btn.textContent = '👁 Following Expert';
        btn.style.background = '#4CC3D9';
      } else {
        btn.textContent = '🔓 Exploring Freely';
        btn.style.background = '#888';
      }
    }

    // --- Web Audio API setup ---
    // AudioContext created lazily on first sound (browser autoplay policy)
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function enterExperience() {
      const ctx = getAudioCtx();
      ctx.resume();
      document.getElementById('enter-overlay').style.display = 'none';
      const camera = document.querySelector('a-camera');
      if (camera) camera.setAttribute('look-controls', 'enabled', true);
    }

    // Short soft beep for highlight
    function playHighlightSound() {
      const ctx = getAudioCtx();
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);

      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(880, ctx.currentTime);       // A5 note
      oscillator.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15); // drop to A4

      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);

      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.3);
    }

    function playExplodeSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
    }
    function playAssembleSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
    }

    // Distinct "snap" sound for lock view
    function playSnapSound() {
      const ctx = getAudioCtx();
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);

      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(300, ctx.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1); // quick rise

      gainNode.gain.setValueAtTime(0.4, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);

      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.25);
    }

    // --- A-Frame load ---
    document.addEventListener('DOMContentLoaded', () => {
      const scene = document.querySelector('a-scene');
      if (scene.hasLoaded) {
        cameraRig = document.querySelector('#camera-rig');
        ghostRig = document.querySelector('#ghost-rig');
      } else {
        scene.addEventListener('loaded', () => {
          cameraRig = document.querySelector('#camera-rig');
          ghostRig = document.querySelector('#ghost-rig');
        });
      }

    });

    // --- Camera smoothing ---
    let currentRotation = { x: 0, y: 0, z: 0 };
    const smoothingFactor = 0.8;

    socket.on('motion-data', (data) => {
      status.textContent = followExpert ? 'Receiving motion data' : 'Exploring freely';
      dataDiv.innerHTML = `
        Alpha: ${data.alpha}°<br>
        Beta: ${data.beta}°<br>
        Gamma: ${data.gamma}°
      `;

      if (cameraRig && followExpert && !viewLocked) {
        const targetRotation = {
          x: parseFloat(data.beta),
          y: parseFloat(data.alpha),
          z: 0
        };

        currentRotation.x += (targetRotation.x - currentRotation.x) * smoothingFactor;
        currentRotation.y += (targetRotation.y - currentRotation.y) * smoothingFactor;
        currentRotation.z = 0;

        cameraRig.setAttribute('rotation', currentRotation);

        if (data.rigX !== undefined) {
          cameraRig.setAttribute('position', {
            x: parseFloat(data.rigX),
            y: parseFloat(data.rigY),
            z: parseFloat(data.rigZ)
          });
        }
      }

      // Always update ghost rotation once expert connects
      if (ghostRig) {
        ghostRig.setAttribute('visible', true);
        ghostRig.setAttribute('rotation', {
          x: parseFloat(data.beta),
          y: parseFloat(data.alpha),
          z: 0
        });
      }
    });

    // --- Snap-to-view / lock ---
    let viewLocked = false;

    socket.on('snap-view', (data) => {
      if (!cameraRig) return;

      viewLocked = true;

      const snapRotation = { x: data.x, y: data.y, z: 0 };
      currentRotation = { ...snapRotation };
      cameraRig.setAttribute('rotation', snapRotation);
      if (data.rigX !== undefined) {
        cameraRig.setAttribute('position', { x: data.rigX, y: data.rigY, z: data.rigZ });
      }

      if (!followExpert) {
        followExpert = true;
        const btn = document.getElementById('follow-btn');
        btn.textContent = '👁 Following Expert';
        btn.style.background = '#4CC3D9';
      }

      snapFlash.classList.add('active');
      setTimeout(() => snapFlash.classList.remove('active'), 300);

      navigator.vibrate && navigator.vibrate([80, 50, 80]);
      playSnapSound();

      status.textContent = '📌 View locked by expert';
    });

    socket.on('unlock-view', () => {
      viewLocked = false;
      status.textContent = 'Receiving motion data';
    });

    socket.on('connect', () => {
      console.log('Connected to server');
      status.textContent = 'Connected - waiting for motion data';
    });

    // --- Highlight ---
    function resetEngineColor() {
      const engine = document.querySelector('#engine');
      if (engine) engine.object3D.traverse(node => {
        if (node.isMesh && node.userData.originalColor) {
          node.material.color.copy(node.userData.originalColor);
        }
      });
    }

    function highlightEngine() {
      const engine = document.querySelector('#engine');
      if (engine) engine.object3D.traverse(node => {
        if (node.isMesh) {
          if (!node.userData.originalColor) {
            node.userData.originalColor = node.material.color.clone();
          }
          node.material = node.material.clone();
          node.material.color.set('#FFFF00');
        }
      });
    }

    socket.on('highlight', (data) => {
      const objectId = data.object;

      resetEngineColor();

      if (!objectId) {
        status.textContent = 'Highlight cleared';
        setTimeout(() => { status.textContent = followExpert ? 'Receiving motion data' : 'Exploring freely'; }, 2000);
        return;
      }

      const object = document.querySelector(`#${objectId}`);

      if (object) {
        if (objectId === 'engine') {
          highlightEngine();
        }

        navigator.vibrate && navigator.vibrate(100);
        playHighlightSound();

        status.textContent = `Highlighting: ${objectId}`;
        setTimeout(() => {
          status.textContent = followExpert ? 'Receiving motion data' : 'Exploring freely';
        }, 2000);
      }
    });

    // --- Explode/Assemble ---
    let clipDuration = null;

    document.addEventListener('DOMContentLoaded', () => {
      const engine = document.querySelector('#engine');
      engine.addEventListener('model-loaded', () => {
        const clips = engine.object3D.animations;
        if (clips && clips.length > 0) clipDuration = clips[0].duration;
      });
    });

    function playAnimation(forward) {
      const engine = document.querySelector('#engine');
      if (!engine) return;
      if (engine.components['animation-mixer']) engine.removeAttribute('animation-mixer');
      setTimeout(() => {
        if (forward) {
          engine.setAttribute('animation-mixer', 'clip: Take 001; loop: once; clampWhenFinished: true; timeScale: 1');
        } else {
          const dur = clipDuration || 2;
          engine.setAttribute('animation-mixer', `clip: Take 001; loop: once; clampWhenFinished: true; timeScale: -1; startAt: ${dur}`);
        }
      }, 50);
    }

    socket.on('explode-view', () => { navigator.vibrate && navigator.vibrate([50, 30, 50, 30, 100]); playExplodeSound(); playAnimation(true); });
    socket.on('assemble-view', () => { navigator.vibrate && navigator.vibrate(80); playAssembleSound(); playAnimation(false); });

    // --- Pinch to zoom (move camera along look direction) ---
    let lastPinchDist = null;

    function getPinchDist(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function moveForward(amount) {
      const rig = document.querySelector('#camera-rig');
      if (!rig) return;
      const pos = rig.getAttribute('position');
      const rot = rig.getAttribute('rotation');
      const yaw = THREE.MathUtils.degToRad(rot.y);
      rig.setAttribute('position', {
        x: pos.x - Math.sin(yaw) * amount,
        y: pos.y,
        z: pos.z - Math.cos(yaw) * amount
      });
    }

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        lastPinchDist = getPinchDist(e.touches);
      }
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && lastPinchDist !== null) {
        e.preventDefault();
        const dist = getPinchDist(e.touches);
        const delta = dist - lastPinchDist;
        lastPinchDist = dist;
        moveForward(delta * 0.008);
      }
    }, { passive: false });

    document.addEventListener('touchend', () => {
      if (lastPinchDist !== null) lastPinchDist = null;
    });
  </script>
</body>
</html>
