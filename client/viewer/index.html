<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer - 3D Scene</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }

    /* Status pill — top left */
    #status {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      left: 12px;
      padding: 8px 16px;
      border-radius: 20px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 14px;
      color: white;
      background: #555;
      z-index: 1000;
      pointer-events: none;
      transition: background 0.3s;
      white-space: nowrap;
    }

    /* Toast — transient feedback */
    #toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 56px);
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 22px;
      border-radius: 20px;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: bold;
      z-index: 1001;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Fullscreen button — bottom left */
    #fullscreen-btn {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      left: 16px;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: none;
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 20px;
      cursor: pointer;
      z-index: 1001;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Help button — top right */
    #hints-btn {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 8px);
      right: 12px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.4);
      color: white;
      font-size: 16px;
      cursor: pointer;
      z-index: 1001;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Hints overlay — center screen */
    #hints-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1001;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s;
    }
    #hints-overlay.visible { display: flex; }
    #hints-overlay.fading { opacity: 0; }
    .hint-pill {
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      white-space: nowrap;
      text-align: center;
    }

    /* iOS fullscreen tip */
    #ios-tip {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      font-family: Arial, sans-serif;
      font-size: 13px;
      padding: 12px 16px 12px 16px;
      border-radius: 14px;
      z-index: 1002;
      display: none;
      max-width: 320px;
      width: calc(100% - 40px);
      text-align: center;
      line-height: 1.5;
    }
    #ios-tip-close {
      display: block;
      margin-top: 8px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 16px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }

    /* Orbit D-pad — bottom right */
    #orbit-controls {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      right: 16px;
      display: none;
      grid-template-areas: ". up ." "left . right" ". down .";
      grid-template-columns: 50px 50px 50px;
      grid-template-rows: 50px 50px 50px;
      gap: 4px;
      z-index: 1001;
    }
    #orbit-controls.visible { display: grid; }
    .orbit-btn {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      border: none;
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 20px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .orbit-btn:active { background: rgba(76,195,217,0.6); }
    #orbit-up    { grid-area: up; }
    #orbit-left  { grid-area: left; }
    #orbit-right { grid-area: right; }
    #orbit-down  { grid-area: down; }


    /* Snap flash overlay */
    #snap-flash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(239, 45, 94, 0.25);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 999;
    }
    #snap-flash.active { opacity: 1; }
  </style>
</head>
<body>

  <div id="snap-flash"></div>

  <!-- Enter overlay -->
  <div id="enter-overlay" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); display: flex; align-items: center;
    justify-content: center; z-index: 2000;">
    <div style="text-align: center;">
      <div style="color: white; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; margin-bottom: 8px;">Novice</div>
      <div style="color: white; font-size: 20px; font-weight: bold; margin-bottom: 6px;">3D Viewer</div>
      <div style="color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 28px;">Follow the expert's guided view</div>
      <button onclick="enterExperience()" style="
        padding: 20px 40px; font-size: 24px; background: #4CC3D9;
        color: white; border: none; border-radius: 12px; cursor: pointer;">
        Enter
      </button>
    </div>
  </div>

  <div id="status">Waiting...</div>
  <div id="toast"></div>

  <div id="hints-overlay">
    <div class="hint-pill">🤏 Pinch to zoom</div>
    <div class="hint-pill">👆 Hold to toggle: follow / explore freely</div>
    <div class="hint-pill">◄ ▲ ▼ ► Orbit around model when exploring</div>
  </div>

  <button id="hints-btn" onclick="showHints()">?</button>
  <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

  <!-- Orbit D-pad -->
  <div id="orbit-controls">
    <button class="orbit-btn" id="orbit-up">▲</button>
    <button class="orbit-btn" id="orbit-left">◄</button>
    <button class="orbit-btn" id="orbit-right">►</button>
    <button class="orbit-btn" id="orbit-down">▼</button>
  </div>

  <!-- A-Frame Scene -->
  <a-scene>
    <a-sky color="#87CEEB"></a-sky>
    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.6" position="2 4 3"></a-light>
    <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>

    <a-entity id="engine" gltf-model="url(/assets/engine.glb)" position="-0.010 1.550 -3" scale="0.010 0.010 0.010" rotation="0 0 0" class="clickable"></a-entity>

    <a-entity id="camera-rig" position="0 1.6 0">
      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-entity>

    <!-- Ghost arrow: shows expert's gaze when viewer is exploring freely -->
    <a-entity id="ghost-rig" position="0 2.2 -2" visible="false">
      <a-sphere color="#4CC3D9" radius="0.08" opacity="0.9"></a-sphere>
      <a-cylinder color="#4CC3D9" opacity="0.7" radius="0.03" height="2" position="0 0 -1" rotation="90 0 0"></a-cylinder>
      <a-cone color="#4CC3D9" opacity="0.9" radius-bottom="0.08" radius-top="0" height="0.2" position="0 0 -2" rotation="90 0 0"></a-cone>
      <a-text value="Expert" align="center" position="0 0.2 0" scale="0.5 0.5 0.5" color="white"></a-text>
    </a-entity>
  </a-scene>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const THREE = AFRAME.THREE;
    const statusEl = document.getElementById('status');
    const toastEl = document.getElementById('toast');
    const snapFlash = document.getElementById('snap-flash');
    let cameraRig = null;
    let ghostRig = null;
    let followExpert = true;
    let viewLocked = false;

    // --- UI helpers ---
    let toastTimer = null;

    function setStatus(message, type = 'default') {
      const colors = { default: '#555', connected: '#4CC3D9', locked: '#EF2D5E', exploring: '#888' };
      statusEl.textContent = message;
      statusEl.style.background = colors[type] || colors.default;
    }

    function showToast(message, color = '#333', duration = 2000) {
      toastEl.textContent = message;
      toastEl.style.background = color;
      toastEl.style.opacity = '1';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toastEl.style.opacity = '0'; }, duration);
    }

    // --- Hints ---
    let hintsTimeout = null;
    function showHints() {
      const overlay = document.getElementById('hints-overlay');
      overlay.classList.add('visible');
      overlay.classList.remove('fading');
      if (hintsTimeout) clearTimeout(hintsTimeout);
      hintsTimeout = setTimeout(() => {
        overlay.classList.add('fading');
        setTimeout(() => overlay.classList.remove('visible'), 1000);
      }, 4000);
    }

    // --- Fullscreen ---
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }
    document.addEventListener('fullscreenchange', () => {
      document.getElementById('fullscreen-btn').textContent = document.fullscreenElement ? '⤡' : '⛶';
    });

    // --- Follow toggle (long press) ---
    function toggleFollow() {
      if (viewLocked) {
        showToast('View locked by expert', '#EF2D5E', 2000);
        return;
      }
      followExpert = !followExpert;
      if (followExpert) {
        setStatus('Following expert', 'connected');
        showToast('👁 Following expert', '#4CC3D9');
        stopOrbit();
        document.getElementById('orbit-controls').classList.remove('visible');
      } else {
        setStatus('Exploring freely', 'exploring');
        showToast('🔓 Exploring freely', '#888');
        initOrbitFromCamera();
        updateOrbitCamera();
        document.getElementById('orbit-controls').classList.add('visible');
      }
    }

    // --- Enter experience ---
    async function enterExperience() {
      const ctx = getAudioCtx();
      await ctx.resume();
      const buf = ctx.createBuffer(1, 1, 22050);
      const src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination); src.start(0);
      document.getElementById('enter-overlay').style.display = 'none';
      document.getElementById('fullscreen-btn').style.display = 'block';
      document.getElementById('hints-btn').style.display = 'block';
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isStandalone = window.navigator.standalone === true;
      if (isIOS && !isStandalone) {
        const tip = document.getElementById('ios-tip');
        tip.style.display = 'block';
        setTimeout(() => { tip.style.display = 'none'; }, 10000);
      }
      showHints();
    }

    // --- Audio ---
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playHighlightSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
    }
    function playExplodeSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
    }
    function playAssembleSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
    }
    function playSnapSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.25);
    }

    // --- A-Frame load ---
    document.addEventListener('DOMContentLoaded', () => {
      const scene = document.querySelector('a-scene');
      const init = () => {
        cameraRig = document.querySelector('#camera-rig');
        ghostRig = document.querySelector('#ghost-rig');
      };
      if (scene.hasLoaded) init(); else scene.addEventListener('loaded', init);

      const engine = document.querySelector('#engine');
      engine.addEventListener('model-loaded', () => {
        const clips = engine.object3D.animations;
        if (clips && clips.length > 0) clipDuration = clips[0].duration;
      });
    });

    // --- Camera smoothing ---
    let currentRotation = { x: 0, y: 0, z: 0 };
    const smoothingFactor = 0.8;

    // --- Orbit controls ---
    const MODEL_CENTER = { x: -0.010, y: 1.550, z: -3 };
    let orbitAngle = 0;
    let orbitElevation = 15;
    let orbitRadius = 3;
    let orbitRaf = null;

    function initOrbitFromCamera() {
      if (!cameraRig) return;
      const pos = cameraRig.getAttribute('position');
      const dx = pos.x - MODEL_CENTER.x;
      const dy = pos.y - MODEL_CENTER.y;
      const dz = pos.z - MODEL_CENTER.z;
      orbitRadius = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (orbitRadius < 0.5) orbitRadius = 3;
      orbitAngle = THREE.MathUtils.radToDeg(Math.atan2(dx, dz));
      orbitElevation = THREE.MathUtils.radToDeg(Math.asin(Math.max(-1, Math.min(1, dy / orbitRadius))));
    }

    function updateOrbitCamera() {
      if (!cameraRig || followExpert) return;
      const phi = THREE.MathUtils.degToRad(orbitAngle);
      const theta = THREE.MathUtils.degToRad(orbitElevation);
      const cosTheta = Math.cos(theta);
      const x = MODEL_CENTER.x + orbitRadius * Math.sin(phi) * cosTheta;
      const y = MODEL_CENTER.y + orbitRadius * Math.sin(theta);
      const z = MODEL_CENTER.z + orbitRadius * Math.cos(phi) * cosTheta;
      cameraRig.setAttribute('position', { x, y, z });
      const dist2d = Math.sqrt((MODEL_CENTER.x - x) ** 2 + (MODEL_CENTER.z - z) ** 2);
      const yawRad = Math.atan2(MODEL_CENTER.x - x, z - MODEL_CENTER.z);
      const pitchRad = Math.atan2(MODEL_CENTER.y - y, dist2d);
      cameraRig.object3D.rotation.order = 'YXZ';
      cameraRig.object3D.rotation.set(pitchRad, yawRad, 0);
      currentRotation = { x: THREE.MathUtils.radToDeg(pitchRad), y: THREE.MathUtils.radToDeg(yawRad), z: 0 };
    }

    function startOrbit(direction) {
      if (followExpert) {
        followExpert = false;
        initOrbitFromCamera();
        setStatus('Exploring freely', 'exploring');
        showToast('🔓 Exploring freely', '#888');
        document.getElementById('orbit-controls').classList.add('visible');
      }
      stopOrbit();
      const step = () => {
        switch (direction) {
          case 'left':  orbitAngle -= 1.5; break;
          case 'right': orbitAngle += 1.5; break;
          case 'up':    orbitElevation = Math.min(orbitElevation + 1.5, 80); break;
          case 'down':  orbitElevation = Math.max(orbitElevation - 1.5, -20); break;
        }
        updateOrbitCamera();
        orbitRaf = requestAnimationFrame(step);
      };
      orbitRaf = requestAnimationFrame(step);
    }

    function stopOrbit() {
      if (orbitRaf) { cancelAnimationFrame(orbitRaf); orbitRaf = null; }
    }

    ['left', 'right', 'up', 'down'].forEach(dir => {
      const btn = document.getElementById('orbit-' + dir);
      btn.addEventListener('touchstart', (e) => { e.stopPropagation(); startOrbit(dir); }, { passive: true });
      btn.addEventListener('touchend',   (e) => { e.stopPropagation(); stopOrbit(); }, { passive: true });
      btn.addEventListener('touchcancel', stopOrbit, { passive: true });
      btn.addEventListener('mousedown', () => startOrbit(dir));
      btn.addEventListener('mouseup', stopOrbit);
      btn.addEventListener('mouseleave', stopOrbit);
    });

    socket.on('motion-data', (data) => {
      if (!viewLocked) {
        setStatus(followExpert ? 'Following expert' : 'Exploring freely', followExpert ? 'connected' : 'exploring');
      }

      if (cameraRig && followExpert && !viewLocked) {
        const targetRotation = { x: parseFloat(data.beta), y: parseFloat(data.alpha), z: 0 };
        currentRotation.x += (targetRotation.x - currentRotation.x) * smoothingFactor;
        currentRotation.y += (targetRotation.y - currentRotation.y) * smoothingFactor;
        currentRotation.z = 0;
        cameraRig.setAttribute('rotation', currentRotation);
        if (data.rigX !== undefined) {
          cameraRig.setAttribute('position', { x: parseFloat(data.rigX), y: parseFloat(data.rigY), z: parseFloat(data.rigZ) });
        }
      }

      if (ghostRig) {
        ghostRig.setAttribute('visible', true);
        ghostRig.setAttribute('rotation', { x: parseFloat(data.beta) + 20, y: parseFloat(data.alpha), z: 0 });
      }
    });

    socket.on('snap-view', (data) => {
      if (!cameraRig) return;
      viewLocked = true;
      const snapRotation = { x: data.x, y: data.y, z: 0 };
      currentRotation = { ...snapRotation };
      cameraRig.setAttribute('rotation', snapRotation);
      if (data.rigX !== undefined) {
        cameraRig.setAttribute('position', { x: data.rigX, y: data.rigY, z: data.rigZ });
      }
      if (!followExpert) followExpert = true;
      document.getElementById('orbit-controls').classList.remove('visible');
      stopOrbit();
      snapFlash.classList.add('active');
      setTimeout(() => snapFlash.classList.remove('active'), 300);
      navigator.vibrate && navigator.vibrate([150, 60, 150, 60, 150]);
      playSnapSound();
      setStatus('📌 View locked', 'locked');
    });

    socket.on('unlock-view', () => {
      viewLocked = false;
      setStatus('Following expert', 'connected');
    });

    socket.on('connect', () => {
      setStatus('Connected', 'connected');
    });

    // --- Highlight ---
    function resetEngineColor() {
      const engine = document.querySelector('#engine');
      if (engine) engine.object3D.traverse(node => {
        if (node.isMesh && node.userData.originalColor) node.material.color.copy(node.userData.originalColor);
      });
    }

    function highlightEngine() {
      const engine = document.querySelector('#engine');
      if (engine) engine.object3D.traverse(node => {
        if (node.isMesh) {
          if (!node.userData.originalColor) node.userData.originalColor = node.material.color.clone();
          node.material = node.material.clone();
          node.material.color.set('#FFFF00');
        }
      });
    }

    socket.on('highlight', (data) => {
      resetEngineColor();
      if (!data.object) {
        showToast('Highlight cleared', '#555', 1500);
        return;
      }
      if (data.object === 'engine') highlightEngine();
      navigator.vibrate && navigator.vibrate(200);
      playHighlightSound();
      showToast(`Highlighting: ${data.object}`, '#4CC3D9', 2000);
    });

    // --- Explode/Assemble ---
    let clipDuration = null;

    function playAnimation(forward) {
      const engine = document.querySelector('#engine');
      if (!engine) return;
      if (engine.components['animation-mixer']) engine.removeAttribute('animation-mixer');
      setTimeout(() => {
        if (forward) {
          engine.setAttribute('animation-mixer', 'clip: Take 001; loop: once; clampWhenFinished: true; timeScale: 1');
        } else {
          const dur = clipDuration || 2;
          engine.setAttribute('animation-mixer', `clip: Take 001; loop: once; clampWhenFinished: true; timeScale: -1; startAt: ${dur}`);
        }
      }, 50);
    }

    socket.on('explode-view', () => { navigator.vibrate && navigator.vibrate([100, 40, 100, 40, 200]); playExplodeSound(); playAnimation(true); });
    socket.on('assemble-view', () => { navigator.vibrate && navigator.vibrate(150); playAssembleSound(); playAnimation(false); });

    socket.on('scrub-animation', (data) => { scrubAnimation(data.t); });

    function scrubAnimation(normalized) {
      const engine = document.querySelector('#engine');
      if (!engine) return;
      const dur = clipDuration || 2;
      if (!engine.getAttribute('animation-mixer')) {
        engine.setAttribute('animation-mixer', 'clip: Take 001; loop: once; clampWhenFinished: true');
      }
      const comp = engine.components['animation-mixer'];
      if (!comp || !comp.mixer) return;
      comp.mixer._actions.forEach(action => {
        action.paused = true;
        action.time = Math.max(0, Math.min(normalized * dur, dur));
      });
      comp.mixer.update(0);
    }

    // --- Long press to toggle follow/explore ---
    let longPressTimer = null;

    document.addEventListener('touchstart', (e) => {
      if (e.target.closest('#orbit-controls')) return;
      if (e.touches.length === 1) {
        longPressTimer = setTimeout(() => {
          toggleFollow();
          navigator.vibrate && navigator.vibrate(120);
          longPressTimer = null;
        }, 700);
      } else {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }, { passive: true });

    document.addEventListener('touchend', () => {
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }, { passive: true });

    // --- Pinch to zoom ---
    let lastPinchDist = null;

    function getPinchDist(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function moveForward(amount) {
      const rig = document.querySelector('#camera-rig');
      if (!rig) return;
      const pos = rig.getAttribute('position');
      const rot = rig.getAttribute('rotation');
      const yaw = THREE.MathUtils.degToRad(rot.y);
      rig.setAttribute('position', {
        x: pos.x - Math.sin(yaw) * amount,
        y: pos.y,
        z: pos.z - Math.cos(yaw) * amount
      });
    }

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) lastPinchDist = getPinchDist(e.touches);
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && lastPinchDist !== null) {
        e.preventDefault();
        const dist = getPinchDist(e.touches);
        const delta = dist - lastPinchDist;
        lastPinchDist = dist;
        if (!followExpert) {
          orbitRadius = Math.max(0.5, orbitRadius - delta * 0.01);
          updateOrbitCamera();
        } else {
          moveForward(delta * 0.008);
        }
      }
    }, { passive: false });

    document.addEventListener('touchend', () => { if (lastPinchDist !== null) lastPinchDist = null; });
  </script>
</body>
</html>
