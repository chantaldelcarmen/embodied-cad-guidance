<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer - 3D Scene</title>
  <!-- PWA / Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="3D Viewer">
  <link rel="manifest" href="manifest.json">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }

    /* Status pill — top left */
    #status {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      left: 12px;
      padding: 8px 16px;
      border-radius: 20px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 14px;
      color: white;
      background: #555;
      z-index: 1000;
      pointer-events: none;
      transition: background 0.3s;
      white-space: nowrap;
    }

    /* Toast — transient feedback */
    #toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 56px);
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 22px;
      border-radius: 20px;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: bold;
      z-index: 1001;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Fullscreen button — bottom right */
    #fullscreen-btn {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      right: 16px;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: none;
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 20px;
      cursor: pointer;
      z-index: 1001;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Help button — top right */
    #hints-btn {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 8px);
      right: 12px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.4);
      color: white;
      font-size: 16px;
      cursor: pointer;
      z-index: 1001;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Hints overlay — center screen */
    #hints-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1001;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s;
    }
    #hints-overlay.visible { display: flex; }
    #hints-overlay.fading { opacity: 0; }
    .hint-pill {
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      white-space: nowrap;
      text-align: center;
    }

    /* iOS fullscreen tip */
    #ios-tip {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      font-family: Arial, sans-serif;
      font-size: 13px;
      padding: 12px 16px 12px 16px;
      border-radius: 14px;
      z-index: 1002;
      display: none;
      max-width: 320px;
      width: calc(100% - 40px);
      text-align: center;
      line-height: 1.5;
    }
    #ios-tip-close {
      display: block;
      margin-top: 8px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 16px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }

    /* Snap flash overlay */
    #snap-flash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(239, 45, 94, 0.25);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 999;
    }
    #snap-flash.active { opacity: 1; }
  </style>
</head>
<body>

  <div id="snap-flash"></div>

  <!-- iOS fullscreen tip -->
  <div id="ios-tip">
    <strong>Go fullscreen on iPad/iPhone:</strong><br>
    Tap <strong>⤢</strong> in Safari's toolbar — or —<br>
    <strong>Share → Add to Home Screen</strong> for permanent fullscreen
    <button id="ios-tip-close" onclick="document.getElementById('ios-tip').style.display='none'">Got it</button>
  </div>

  <!-- Enter overlay -->
  <div id="enter-overlay" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); display: flex; align-items: center;
    justify-content: center; z-index: 2000;">
    <button onclick="enterExperience()" style="
      padding: 20px 40px; font-size: 24px; background: #4CC3D9;
      color: white; border: none; border-radius: 12px; cursor: pointer;">
      Enter
    </button>
  </div>

  <div id="status">Waiting...</div>
  <div id="toast"></div>

  <div id="hints-overlay">
    <div class="hint-pill">🤏 Pinch to zoom</div>
    <div class="hint-pill">👆 Hold to toggle: follow / explore freely</div>
  </div>

  <button id="hints-btn" onclick="showHints()">?</button>
  <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

  <!-- A-Frame Scene -->
  <a-scene vr-mode-ui="enabled: false">
    <a-sky color="#87CEEB"></a-sky>
    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.6" position="2 4 3"></a-light>
    <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>

    <a-entity id="engine" gltf-model="url(/assets/engine.glb)" position="-0.010 1.550 -3" scale="0.010 0.010 0.010" rotation="0 0 0" class="clickable"></a-entity>

    <a-entity id="camera-rig" position="0 1.6 0">
      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-entity>

    <!-- Ghost arrow: shows expert's gaze when viewer is exploring freely -->
    <a-entity id="ghost-rig" position="0 2.2 -2" visible="false">
      <a-sphere color="#4CC3D9" radius="0.08" opacity="0.9"></a-sphere>
      <a-cylinder color="#4CC3D9" opacity="0.7" radius="0.03" height="2" position="0 0 -1" rotation="90 0 0"></a-cylinder>
      <a-cone color="#4CC3D9" opacity="0.9" radius-bottom="0.08" radius-top="0" height="0.2" position="0 0 -2" rotation="90 0 0"></a-cone>
      <a-text value="Expert" align="center" position="0 0.2 0" scale="0.5 0.5 0.5" color="white"></a-text>
    </a-entity>
  </a-scene>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const THREE = AFRAME.THREE;
    const statusEl = document.getElementById('status');
    const toastEl = document.getElementById('toast');
    const snapFlash = document.getElementById('snap-flash');
    let cameraRig = null;
    let ghostRig = null;
    let followExpert = true;
    let viewLocked = false;

    // --- UI helpers ---
    let toastTimer = null;

    function setStatus(message, type = 'default') {
      const colors = { default: '#555', connected: '#4CC3D9', locked: '#EF2D5E', exploring: '#888' };
      statusEl.textContent = message;
      statusEl.style.background = colors[type] || colors.default;
    }

    function showToast(message, color = '#333', duration = 2000) {
      toastEl.textContent = message;
      toastEl.style.background = color;
      toastEl.style.opacity = '1';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toastEl.style.opacity = '0'; }, duration);
    }

    // --- Hints ---
    let hintsTimeout = null;
    function showHints() {
      const overlay = document.getElementById('hints-overlay');
      overlay.classList.add('visible');
      overlay.classList.remove('fading');
      if (hintsTimeout) clearTimeout(hintsTimeout);
      hintsTimeout = setTimeout(() => {
        overlay.classList.add('fading');
        setTimeout(() => overlay.classList.remove('visible'), 1000);
      }, 4000);
    }

    // --- Fullscreen ---
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }
    document.addEventListener('fullscreenchange', () => {
      document.getElementById('fullscreen-btn').textContent = document.fullscreenElement ? '⤡' : '⛶';
    });

    // --- Follow toggle (long press) ---
    function toggleFollow() {
      if (viewLocked) {
        showToast('View locked by expert', '#EF2D5E', 2000);
        return;
      }
      followExpert = !followExpert;
      if (followExpert) {
        setStatus('Following expert', 'connected');
        showToast('👁 Following expert', '#4CC3D9');
      } else {
        setStatus('Exploring freely', 'exploring');
        showToast('🔓 Exploring freely', '#888');
      }
    }

    // --- Enter experience ---
    async function enterExperience() {
      try {
        const ctx = getAudioCtx();
        await ctx.resume();
        const buf = ctx.createBuffer(1, 1, 22050);
        const src = ctx.createBufferSource();
        src.buffer = buf; src.connect(ctx.destination); src.start(0);
      } catch (e) {
        // Audio unlock failed — continue anyway
      }
      document.getElementById('enter-overlay').style.display = 'none';
      if (document.documentElement.requestFullscreen) document.getElementById('fullscreen-btn').style.display = 'block';
      document.getElementById('hints-btn').style.display = 'block';
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isStandalone = window.navigator.standalone === true;
      if (isIOS && !isStandalone) {
        const tip = document.getElementById('ios-tip');
        tip.style.display = 'block';
        setTimeout(() => { tip.style.display = 'none'; }, 10000);
      }
      const camera = document.querySelector('a-camera');
      if (camera) camera.setAttribute('look-controls', 'enabled', true);
      showHints();
    }

    // --- Audio ---
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    // Fallback: resume suspended context on any touch (iOS PWA standalone)
    document.addEventListener('touchstart', () => {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }, { passive: true });
    function playHighlightSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
    }
    function playExplodeSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
    }
    function playAssembleSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
    }
    function playSnapSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.25);
    }

    // --- A-Frame load ---
    document.addEventListener('DOMContentLoaded', () => {
      const scene = document.querySelector('a-scene');
      const init = () => {
        cameraRig = document.querySelector('#camera-rig');
        ghostRig = document.querySelector('#ghost-rig');
      };
      if (scene.hasLoaded) init(); else scene.addEventListener('loaded', init);

      const engine = document.querySelector('#engine');
      engine.addEventListener('model-loaded', () => {
        const clips = engine.object3D.animations;
        if (clips && clips.length > 0) clipDuration = clips[0].duration;
      });
    });

    // --- Camera smoothing ---
    let currentRotation = { x: 0, y: 0, z: 0 };
    const smoothingFactor = 0.8;

    socket.on('motion-data', (data) => {
      if (!viewLocked) {
        setStatus(followExpert ? 'Following expert' : 'Exploring freely', followExpert ? 'connected' : 'exploring');
      }

      if (cameraRig && followExpert && !viewLocked) {
        const targetRotation = { x: parseFloat(data.beta), y: parseFloat(data.alpha), z: 0 };
        currentRotation.x += (targetRotation.x - currentRotation.x) * smoothingFactor;
        currentRotation.y += (targetRotation.y - currentRotation.y) * smoothingFactor;
        currentRotation.z = 0;
        cameraRig.setAttribute('rotation', currentRotation);
        if (data.rigX !== undefined) {
          cameraRig.setAttribute('position', { x: parseFloat(data.rigX), y: parseFloat(data.rigY), z: parseFloat(data.rigZ) });
        }
      }

      if (ghostRig) {
        ghostRig.setAttribute('visible', true);
        ghostRig.setAttribute('rotation', { x: parseFloat(data.beta) + 20, y: parseFloat(data.alpha), z: 0 });
      }
    });

    socket.on('snap-view', (data) => {
      if (!cameraRig) return;
      viewLocked = true;
      const snapRotation = { x: data.x, y: data.y, z: 0 };
      currentRotation = { ...snapRotation };
      cameraRig.setAttribute('rotation', snapRotation);
      if (data.rigX !== undefined) {
        cameraRig.setAttribute('position', { x: data.rigX, y: data.rigY, z: data.rigZ });
      }
      if (!followExpert) followExpert = true;
      snapFlash.classList.add('active');
      setTimeout(() => snapFlash.classList.remove('active'), 300);
      navigator.vibrate && navigator.vibrate([80, 50, 80]);
      playSnapSound();
      setStatus('📌 View locked', 'locked');
    });

    socket.on('unlock-view', () => {
      viewLocked = false;
      setStatus('Following expert', 'connected');
    });

    socket.on('connect', () => {
      setStatus('Connected', 'connected');
    });

    // --- Highlight ---
    function resetEngineColor() {
      const engine = document.querySelector('#engine');
      if (engine) engine.object3D.traverse(node => {
        if (node.isMesh && node.userData.originalColor) node.material.color.copy(node.userData.originalColor);
      });
    }

    function highlightEngine() {
      const engine = document.querySelector('#engine');
      if (engine) engine.object3D.traverse(node => {
        if (node.isMesh) {
          if (!node.userData.originalColor) node.userData.originalColor = node.material.color.clone();
          node.material = node.material.clone();
          node.material.color.set('#FFFF00');
        }
      });
    }

    socket.on('highlight', (data) => {
      resetEngineColor();
      if (!data.object) {
        showToast('Highlight cleared', '#555', 1500);
        return;
      }
      if (data.object === 'engine') highlightEngine();
      navigator.vibrate && navigator.vibrate(100);
      playHighlightSound();
      showToast(`Highlighting: ${data.object}`, '#4CC3D9', 2000);
    });

    // --- Explode/Assemble ---
    let clipDuration = null;

    function playAnimation(forward) {
      const engine = document.querySelector('#engine');
      if (!engine) return;
      if (engine.components['animation-mixer']) engine.removeAttribute('animation-mixer');
      setTimeout(() => {
        if (forward) {
          engine.setAttribute('animation-mixer', 'clip: Take 001; loop: once; clampWhenFinished: true; timeScale: 1');
        } else {
          const dur = clipDuration || 2;
          engine.setAttribute('animation-mixer', `clip: Take 001; loop: once; clampWhenFinished: true; timeScale: -1; startAt: ${dur}`);
        }
      }, 50);
    }

    socket.on('explode-view', () => { navigator.vibrate && navigator.vibrate([50, 30, 50, 30, 100]); playExplodeSound(); playAnimation(true); });
    socket.on('assemble-view', () => { navigator.vibrate && navigator.vibrate(80); playAssembleSound(); playAnimation(false); });

    // --- Long press to toggle follow/explore ---
    let longPressTimer = null;

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        longPressTimer = setTimeout(() => {
          toggleFollow();
          navigator.vibrate && navigator.vibrate(50);
          longPressTimer = null;
        }, 700);
      } else {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }, { passive: true });

    document.addEventListener('touchend', () => {
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }, { passive: true });

    // --- Pinch to zoom ---
    let lastPinchDist = null;

    function getPinchDist(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function moveForward(amount) {
      const rig = document.querySelector('#camera-rig');
      if (!rig) return;
      const pos = rig.getAttribute('position');
      const rot = rig.getAttribute('rotation');
      const yaw = THREE.MathUtils.degToRad(rot.y);
      rig.setAttribute('position', {
        x: pos.x - Math.sin(yaw) * amount,
        y: pos.y,
        z: pos.z - Math.cos(yaw) * amount
      });
    }

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) lastPinchDist = getPinchDist(e.touches);
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && lastPinchDist !== null) {
        e.preventDefault();
        const dist = getPinchDist(e.touches);
        const delta = dist - lastPinchDist;
        lastPinchDist = dist;
        moveForward(delta * 0.008);
      }
    }, { passive: false });

    document.addEventListener('touchend', () => { if (lastPinchDist !== null) lastPinchDist = null; });
  </script>
</body>
</html>
