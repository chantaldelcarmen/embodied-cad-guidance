<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expert - Motion Capture</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      pointer-events: none;
    }
    #ui-overlay > * {
      pointer-events: auto;
    }
    button {
      width: calc(100% - 40px);
      max-width: 500px;
      padding: 15px;
      margin: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #startBtn {
      background: #4CC3D9;
      color: white;
    }
    #startBtn:disabled {
      background: #BBB;
    }
    .highlight-btn {
      background: rgba(238, 238, 238, 0.9);
      color: #333;
      padding: 10px;
      font-size: 14px;
      margin: 5px 20px;
    }
    .highlight-btn:active {
      background: #FFC65D;
    }
    #lockViewBtn {
      background: #EF2D5E;
      color: white;
      font-size: 16px;
      margin: 5px 20px;
    }
    #lockViewBtn:active {
      background: #c0234e;
    }
    #status {
      margin: 10px 20px;
      padding: 10px 15px;
      background: rgba(240, 240, 240, 0.9);
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
    }
    #data {
      margin: 5px 20px;
      padding: 5px 15px;
      font-family: monospace;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 4px;
    }
    .controls {
      margin-top: 10px;
    }
    .controls h2 {
      font-size: 16px;
      margin: 10px 20px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #tap-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(76, 195, 217, 0.9);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      pointer-events: none;
    }
    a-scene {
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <!-- A-Frame 3D Scene -->
  <a-scene id="scene" vr-mode-ui="enabled: false">
    <a-sky color="#87CEEB"></a-sky>
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" position="-1 1 1" intensity="0.7"></a-light>

    <!-- Camera rig for rotation control -->
    <a-entity id="camera-rig" position="0 1.6 0">
      <a-camera position="0 0 0">
        <!-- Cursor for raycasting on mobile -->
        <a-cursor 
          raycaster="objects: .clickable"
          fuse="false"
          color="white"
          opacity="0.5">
        </a-cursor>
      </a-camera>
    </a-entity>

    <!-- Ground plane -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>

    <!-- Interactive objects matching viewer -->
    <a-entity id="engine" gltf-model="url(/assets/engine.glb)" position="-0.010 1.550 -3" scale="0.010 0.010 0.010" rotation="0 0 0" class="clickable"></a-entity>
  </a-scene>

  <!-- Start overlay -->
  <div id="start-overlay" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); display: flex; align-items: center;
    justify-content: center; z-index: 2000;">
    <button id="startBtn" style="
      padding: 20px 40px; font-size: 24px; background: #4CC3D9;
      color: white; border: none; border-radius: 12px; cursor: pointer;">
      Start Motion Capture
    </button>
  </div>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div id="status">Ready</div>
    <div id="data" style="display:none;"></div>
    
    <div class="controls" id="controls" style="display: none;">
      <!-- Lock View button -->
      <button id="lockViewBtn" onclick="lockView()">📌 Lock This View for Novice</button>
      <!-- Explode/Assemble button -->
      <button id="explodeBtn" onclick="toggleExplode()" style="margin-top: 8px; width: 100%; padding: 10px; background: #FF8C00; color: white; border: none; border-radius: 6px; font-family: monospace; font-size: 13px; cursor: pointer;">💥 Explode Assembly</button>
    </div>

    <div id="tap-hint" style="display: none;">👆 Tap objects to highlight | 📌 Lock view to teach</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const THREE = AFRAME.THREE;
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const dataDiv = document.getElementById('data');
    const tapHint = document.getElementById('tap-hint');
    let scene = null;
    let cameraRig = null;

    let currentHeading = 0;
    let currentTilt = 0;
    let viewLocked = false;

    document.addEventListener('DOMContentLoaded', () => {
      scene = document.querySelector('a-scene');
      if (scene.hasLoaded) {
        cameraRig = document.getElementById('camera-rig');
      } else {
        scene.addEventListener('loaded', () => {
          cameraRig = document.getElementById('camera-rig');
        });
      }
    });

    startBtn.addEventListener('click', async () => {
      try {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          const op = await DeviceOrientationEvent.requestPermission();
          if (op !== 'granted') { status.textContent = 'Permission denied'; return; }
        }
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
          const mp = await DeviceMotionEvent.requestPermission();
          if (mp !== 'granted') { status.textContent = 'Permission denied'; return; }
        }
        startListening();
      } catch (error) {
        status.textContent = 'Error: ' + error.message;
      }
    });

    function startListening() {
      document.getElementById('start-overlay').style.display = 'none';
      document.getElementById('controls').style.display = 'block';
      tapHint.style.display = 'block';

      let lastUpdate = 0;
      const throttleDelay = 50;

      let currentRotation = { x: 0, y: 0, z: 0 };
      const smoothingFactor = 0.3;

      let headingDeg = null;
      let lastMotionTime = null;
      let magHeading = null;
      let initialAlpha = null;
      const MAG_CORRECTION = 0.02;
      const MAG_FREEZE_THRESHOLD = 8;

      let currentBeta = 0;
      let initialBeta = null;

      window.addEventListener('deviceorientation', (event) => {
        if (initialBeta === null && event.beta !== null) {
          initialBeta = event.beta;
          initialAlpha = event.alpha || 0;
          status.textContent = 'Streaming motion data...';
        }
        if (initialBeta !== null) {
          currentBeta = (event.beta || 0) - initialBeta;
          if (currentBeta > 80) currentBeta = 80;
          if (currentBeta < -80) currentBeta = -80;

          let rawMag = (event.alpha || 0) - initialAlpha;
          if (rawMag > 180) rawMag -= 360;
          if (rawMag < -180) rawMag += 360;
          magHeading = rawMag;
        }
      });

      window.addEventListener('devicemotion', (event) => {
        const now = Date.now();
        if (lastMotionTime !== null && event.rotationRate) {
          const dt = (now - lastMotionTime) / 1000;

          if (headingDeg === null) headingDeg = magHeading || 0;
          headingDeg -= event.rotationRate.gamma * dt;
          if (headingDeg > 180) headingDeg -= 360;
          if (headingDeg < -180) headingDeg += 360;

          if (magHeading !== null && currentBeta <= MAG_FREEZE_THRESHOLD) {
            let magDelta = magHeading - headingDeg;
            if (magDelta > 180) magDelta -= 360;
            if (magDelta < -180) magDelta += 360;
            headingDeg += magDelta * MAG_CORRECTION;
          }
        }
        lastMotionTime = now;

        currentHeading = headingDeg || 0;
        currentTilt = currentBeta;

        if (now - lastUpdate < throttleDelay) return;
        if (viewLocked) return;
        lastUpdate = now;

        const data = {
          alpha: headingDeg.toFixed(1),
          beta: currentBeta.toFixed(1),
          gamma: '0'
        };

        socket.emit('motion-data', data);
        dataDiv.style.display = 'block';
        dataDiv.textContent = 'heading: ' + data.alpha + 'deg  tilt: ' + data.beta + 'deg';

        if (cameraRig) {
          const targetRotation = { x: currentBeta, y: headingDeg, z: 0 };
          currentRotation.x += (targetRotation.x - currentRotation.x) * smoothingFactor;
          currentRotation.y += (targetRotation.y - currentRotation.y) * smoothingFactor;
          currentRotation.z = 0;
          cameraRig.setAttribute('rotation', currentRotation);
        }
      });

      setupRaycasting();
    }

    // Send snap-to-view event with current rotation
    function lockView() {
      viewLocked = !viewLocked;
      const btn = document.getElementById('lockViewBtn');
      const camera = document.querySelector('a-camera');
      if (viewLocked) {
        const snapData = { x: currentTilt, y: currentHeading, z: 0 };
        socket.emit('snap-view', snapData);
        btn.textContent = '🔓 Unlock View';
        btn.style.background = '#888';
        status.textContent = '📌 View locked';
        if (camera) camera.setAttribute('look-controls', 'enabled', false);
      } else {
        socket.emit('unlock-view');
        btn.textContent = '📌 Lock This View for Novice';
        btn.style.background = '#EF2D5E';
        status.textContent = 'Streaming motion data...';
        if (camera) camera.setAttribute('look-controls', 'enabled', true);
      }
    }

    let exploded = false;
    let clipDuration = null;

    document.addEventListener('DOMContentLoaded', () => {
      const engine = document.querySelector('#engine');
      engine.addEventListener('model-loaded', () => {
        const clips = engine.object3D.animations;
        if (clips && clips.length > 0) clipDuration = clips[0].duration;
      });
    });

    function toggleExplode() {
      exploded = !exploded;
      const btn = document.getElementById('explodeBtn');
      if (exploded) {
        socket.emit('explode-view');
        btn.textContent = '🔧 Assemble';
        btn.style.background = '#888';
      } else {
        socket.emit('assemble-view');
        btn.textContent = '💥 Explode Assembly';
        btn.style.background = '#FF8C00';
      }
      playAnimation(exploded);
    }

    function playAnimation(forward) {
      const engine = document.querySelector('#engine');
      if (!engine) return;
      engine.removeAttribute('animation-mixer');
      if (forward) {
        engine.setAttribute('animation-mixer', 'clip: Take 001; loop: once; clampWhenFinished: true; timeScale: 1');
      } else {
        const dur = clipDuration || 2;
        engine.setAttribute('animation-mixer', `clip: Take 001; loop: once; clampWhenFinished: true; timeScale: -1; startAt: ${dur}`);
      }
    }

    function setupRaycasting() {
      const clickables = document.querySelectorAll('.clickable');
      clickables.forEach(obj => {
        obj.addEventListener('click', () => {
          highlightObject(obj.id);
        });
      });
    }

    function highlightObject(objectId) {
      socket.emit('highlight', { object: objectId });

      const object = document.querySelector(`#${objectId}`);
      if (object) {
        // Reset all clickables
        document.querySelectorAll('.clickable').forEach(obj => {
          obj.object3D.traverse(node => {
            if (node.isMesh && node.userData.originalColor) {
              node.material.color.copy(node.userData.originalColor);
            }
          });
        });
        // Highlight selected
        object.object3D.traverse(node => {
          if (node.isMesh) {
            if (!node.userData.originalColor) {
              node.userData.originalColor = node.material.color.clone();
            }
            node.material = node.material.clone();
            node.material.color.set('#FFFF00');
          }
        });
        status.textContent = `Highlighted ${objectId}`;
      }

      setTimeout(() => {
        status.textContent = 'Streaming motion data...';
      }, 1000);
    }
  </script>
</body>
</html>
