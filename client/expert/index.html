<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expert - Motion Capture</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      pointer-events: none;
    }
    #ui-overlay > * {
      pointer-events: auto;
    }
    button {
      width: calc(100% - 40px);
      max-width: 500px;
      padding: 15px;
      margin: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #startBtn {
      background: #4CC3D9;
      color: white;
    }
    #startBtn:disabled {
      background: #BBB;
    }
    .highlight-btn {
      background: rgba(238, 238, 238, 0.9);
      color: #333;
      padding: 10px;
      font-size: 14px;
      margin: 5px 20px;
    }
    .highlight-btn:active {
      background: #FFC65D;
    }
    #status {
      margin: 10px 20px;
      padding: 10px 15px;
      background: rgba(240, 240, 240, 0.9);
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
    }
    #data {
      margin: 5px 20px;
      padding: 5px 15px;
      font-family: monospace;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 4px;
    }
    .controls {
      margin-top: 10px;
    }
    .controls h2 {
      font-size: 16px;
      margin: 10px 20px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #tap-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(76, 195, 217, 0.9);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      pointer-events: none;
    }
    a-scene {
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <!-- A-Frame 3D Scene -->
  <a-scene id="scene" vr-mode-ui="enabled: false">
    <a-sky color="#87CEEB"></a-sky>
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" position="-1 1 1" intensity="0.7"></a-light>

    <!-- Camera rig for rotation control -->
    <a-entity id="camera-rig" position="0 1.6 0">
      <a-camera position="0 0 0">
        <!-- Cursor for raycasting on mobile -->
        <a-cursor 
          raycaster="objects: .clickable"
          fuse="false"
          color="white"
          opacity="0.5">
        </a-cursor>
      </a-camera>
    </a-entity>

    <!-- Ground plane -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>

    <!-- Interactive objects matching viewer (same positions as viewer) -->
    <a-box id="box" position="0 1 -3" rotation="0 45 0" color="#4CC3D9" class="clickable"></a-box>
    <a-cylinder id="cylinder" position="2 0.75 -3" radius="0.5" height="1.5" color="#FFC65D" class="clickable"></a-cylinder>
    <a-sphere id="sphere" position="-2 1.25 -3" radius="0.5" color="#EF2D5E" class="clickable"></a-sphere>
  </a-scene>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <button id="startBtn">Start Motion Capture</button>
    <div id="status">Ready</div>
    <div id="data"></div>
    
    <div class="controls" id="controls" style="display: none;">
      <h2>Fallback Controls</h2>
      <button class="highlight-btn" onclick="highlightObject('box')">Highlight Box</button>
      <button class="highlight-btn" onclick="highlightObject('cylinder')">Highlight Cylinder</button>
      <button class="highlight-btn" onclick="highlightObject('sphere')">Highlight Sphere</button>
    </div>

    <div id="tap-hint" style="display: none;">ðŸ‘† Tap on objects to highlight them</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const dataDiv = document.getElementById('data');
    const tapHint = document.getElementById('tap-hint');
    let scene = null;
    let cameraRig = null;

    // Wait for A-Frame to load
    document.addEventListener('DOMContentLoaded', () => {
      scene = document.querySelector('a-scene');
      if (scene.hasLoaded) {
        cameraRig = document.getElementById('camera-rig');
      } else {
        scene.addEventListener('loaded', () => {
          cameraRig = document.getElementById('camera-rig');
        });
      }
    });

    startBtn.addEventListener('click', async () => {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission === 'granted') {
            startListening();
          } else {
            status.textContent = 'Permission denied';
          }
        } catch (error) {
          status.textContent = 'Error: ' + error.message;
        }
      } else {
        startListening();
      }
    });

    function startListening() {
      status.textContent = 'Calibrating... Hold phone steady';
      startBtn.disabled = true;
      startBtn.style.display = 'none';
      document.getElementById('controls').style.display = 'block';
      tapHint.style.display = 'block';

      let lastUpdate = 0;
      const throttleDelay = 50; // Send updates every 50ms (20 fps)
      
      // Smoothing for expert's own view
      let currentRotation = { x: 0, y: 0, z: 0 };
      const smoothingFactor = 0.3; // Lower = smoother but more lag
      
      // Alpha freeze: hold last stable alpha when tilted up (magnetometer unreliable above threshold)
      let smoothedAlpha = null;
      const alphaSmoothing = 0.3;
      const ALPHA_FREEZE_THRESHOLD = 8; // degrees beta above which alpha is frozen
      
      // Calibration: capture initial orientation as neutral position
      let initialAlpha = null;
      let initialBeta = null;
      let isCalibrated = false;

      // Update camera rotation based on device orientation
      window.addEventListener('deviceorientation', (event) => {
        // Calibrate on first reading (use 0 if values are null)
        if (!isCalibrated) {
          initialAlpha = event.alpha !== null ? event.alpha : 0;
          initialBeta = event.beta !== null ? event.beta : 0;
          isCalibrated = true;
          status.textContent = 'Streaming motion data...';
          console.log(`Calibrated: Î±=${initialAlpha.toFixed(1)}Â° Î²=${initialBeta.toFixed(1)}Â°`);
        }
        
        const now = Date.now();
        if (now - lastUpdate < throttleDelay) return;
        lastUpdate = now;

        // Calculate calibrated values (relative to starting position)
        let alpha = (event.alpha !== null ? event.alpha : 0) - initialAlpha;
        let beta = (event.beta !== null ? event.beta : 0) - initialBeta;
        const gamma = event.gamma !== null ? event.gamma : 0;
        
        // Normalize alpha to -180 to 180 range
        if (alpha > 180) alpha -= 360;
        if (alpha < -180) alpha += 360;

        // Alpha freeze: when tilted up, hold last stable alpha to prevent magnetometer drift
        if (smoothedAlpha === null) smoothedAlpha = alpha;
        if (beta <= ALPHA_FREEZE_THRESHOLD) {
          let alphaDelta = alpha - smoothedAlpha;
          if (alphaDelta > 180) alphaDelta -= 360;
          if (alphaDelta < -180) alphaDelta += 360;
          smoothedAlpha += alphaDelta * alphaSmoothing;
          if (smoothedAlpha > 180) smoothedAlpha -= 360;
          if (smoothedAlpha < -180) smoothedAlpha += 360;
        }
        // else: beta above threshold — smoothedAlpha frozen at last stable value
        alpha = smoothedAlpha;

        // Suppress alpha changes near gimbal lock to prevent ping-ponging
        if (Math.abs(beta) > 40) {
          // Near gimbal lock - freeze alpha at last stable value
          alpha = stableAlpha;
        } else {
          // Update stable alpha when away from gimbal lock
          stableAlpha = alpha;
        }

        // Clamp beta BEFORE sending to prevent gimbal lock
        if (beta > 80) beta = 80;   // Limit looking up
        if (beta < -80) beta = -80;  // Limit looking down
        
        // Send calibrated values to viewer
        const data = {
          alpha: alpha.toFixed(1),
          beta: beta.toFixed(1),
          gamma: gamma.toFixed(1)
        };
        
        socket.emit('motion-data', data);
        dataDiv.textContent = `Î±: ${data.alpha}Â° Î²: ${data.beta}Â° Î³: ${data.gamma}Â°`;

        // Update expert's own camera view
        if (cameraRig && alpha !== null && beta !== null) {

          // Calculate target rotation (calibration offset already applied)
          const targetRotation = {
            x: beta,     // tilt already calibrated
            y: alpha,    // turn already calibrated (flip the sign)
            z: 0
          };
          
          // Smooth interpolation (exponential moving average)
          // Reduced smoothing for more responsive controls
          currentRotation.x += (targetRotation.x - currentRotation.x) * smoothingFactor;
          currentRotation.y += (targetRotation.y - currentRotation.y) * smoothingFactor; // Same speed as X
          currentRotation.z += (targetRotation.z - currentRotation.z) * smoothingFactor;
          
          // Apply smoothed rotation
          cameraRig.setAttribute('rotation', currentRotation);
        }
      });

      // Add raycasting for tap-to-select
      setupRaycasting();
    }

    function setupRaycasting() {
      // Listen for clicks on clickable objects
      const clickables = document.querySelectorAll('.clickable');
      
      clickables.forEach(obj => {
        obj.addEventListener('click', (evt) => {
          highlightObject(obj.id);
        });
      });
    }

    function highlightObject(objectId) {
      socket.emit('highlight', { object: objectId });
      
      // Highlight on expert's own screen
      const object = document.querySelector(`#${objectId}`);
      if (object) {
        // Reset all objects to their original colors first
        document.querySelectorAll('.clickable').forEach(obj => {
          const id = obj.getAttribute('id');
          if (id === 'box') obj.setAttribute('color', '#4CC3D9');
          if (id === 'cylinder') obj.setAttribute('color', '#FFC65D');
          if (id === 'sphere') obj.setAttribute('color', '#EF2D5E');
        });
        
        // Highlight the selected object
        object.setAttribute('color', '#FFFF00'); // Yellow highlight
        status.textContent = `Highlighted ${objectId}`;
      }
      
      setTimeout(() => {
        status.textContent = 'Streaming motion data...';
      }, 1000);
    }
  </script>
</body>
</html>
