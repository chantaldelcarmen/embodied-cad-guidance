<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expert - Motion Capture</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      pointer-events: none;
    }
    #ui-overlay > * {
      pointer-events: auto;
    }
    button {
      width: calc(100% - 40px);
      max-width: 500px;
      padding: 15px;
      margin: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #startBtn {
      background: #4CC3D9;
      color: white;
    }
    #startBtn:disabled {
      background: #BBB;
    }
    .highlight-btn {
      background: rgba(238, 238, 238, 0.9);
      color: #333;
      padding: 10px;
      font-size: 14px;
      margin: 5px 20px;
    }
    .highlight-btn:active {
      background: #FFC65D;
    }
    #status {
      margin: 10px 20px;
      padding: 10px 15px;
      background: rgba(240, 240, 240, 0.9);
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
    }
    #data {
      margin: 5px 20px;
      padding: 5px 15px;
      font-family: monospace;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 4px;
    }
    .controls {
      margin-top: 10px;
    }
    .controls h2 {
      font-size: 16px;
      margin: 10px 20px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #tap-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(76, 195, 217, 0.9);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      pointer-events: none;
    }
    a-scene {
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <!-- A-Frame 3D Scene -->
  <a-scene id="scene" vr-mode-ui="enabled: false">
    <a-sky color="#87CEEB"></a-sky>
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" position="-1 1 1" intensity="0.7"></a-light>

    <!-- Camera rig for rotation control -->
    <a-entity id="camera-rig" position="0 1.6 0">
      <a-camera position="0 0 0">
        <!-- Cursor for raycasting on mobile -->
        <a-cursor 
          raycaster="objects: .clickable"
          fuse="false"
          color="white"
          opacity="0.5">
        </a-cursor>
      </a-camera>
    </a-entity>

    <!-- Ground plane -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>

    <!-- Interactive objects matching viewer (same positions as viewer) -->
    <a-box id="box" position="0 1 -3" rotation="0 45 0" color="#4CC3D9" class="clickable"></a-box>
    <a-cylinder id="cylinder" position="2 0.75 -3" radius="0.5" height="1.5" color="#FFC65D" class="clickable"></a-cylinder>
    <a-sphere id="sphere" position="-2 1.25 -3" radius="0.5" color="#EF2D5E" class="clickable"></a-sphere>
  </a-scene>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <button id="startBtn">Start Motion Capture</button>
    <div id="status">Ready</div>
    <div id="data"></div>
    
    <div class="controls" id="controls" style="display: none;">
      <h2>Fallback Controls</h2>
      <button class="highlight-btn" onclick="highlightObject('box')">Highlight Box</button>
      <button class="highlight-btn" onclick="highlightObject('cylinder')">Highlight Cylinder</button>
      <button class="highlight-btn" onclick="highlightObject('sphere')">Highlight Sphere</button>
    </div>

    <div id="tap-hint" style="display: none;">👆 Tap on objects to highlight them</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const dataDiv = document.getElementById('data');
    const tapHint = document.getElementById('tap-hint');
    let scene = null;
    let cameraRig = null;

    // Wait for A-Frame to load
    document.addEventListener('DOMContentLoaded', () => {
      scene = document.querySelector('a-scene');
      if (scene.hasLoaded) {
        cameraRig = document.getElementById('camera-rig');
      } else {
        scene.addEventListener('loaded', () => {
          cameraRig = document.getElementById('camera-rig');
        });
      }
    });

    startBtn.addEventListener('click', async () => {
      try {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          const op = await DeviceOrientationEvent.requestPermission();
          if (op !== 'granted') { status.textContent = 'Permission denied'; return; }
        }
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
          const mp = await DeviceMotionEvent.requestPermission();
          if (mp !== 'granted') { status.textContent = 'Permission denied'; return; }
        }
        startListening();
      } catch (error) {
        status.textContent = 'Error: ' + error.message;
      }
    });

    function startListening() {
      startBtn.disabled = true;
      startBtn.style.display = 'none';
      document.getElementById('controls').style.display = 'block';
      tapHint.style.display = 'block';

      let lastUpdate = 0;
      const throttleDelay = 50; // 20fps

      // Camera smoothing
      let currentRotation = { x: 0, y: 0, z: 0 };
      const smoothingFactor = 0.3;

      // Gyroscope-integrated heading (no magnetometer - stable at all tilt angles)
      let headingDeg = 0;
      let lastMotionTime = null;

      // Beta (tilt) from DeviceOrientationEvent - stable via accelerometer/gravity
      let currentBeta = 0;
      let initialBeta = null;

      // DeviceOrientationEvent: calibrate and track beta only
      window.addEventListener('deviceorientation', (event) => {
        if (initialBeta === null && event.beta !== null) {
          initialBeta = event.beta;
          status.textContent = 'Streaming motion data...';
        }
        if (initialBeta !== null) {
          currentBeta = (event.beta || 0) - initialBeta;
          if (currentBeta > 80) currentBeta = 80;
          if (currentBeta < -80) currentBeta = -80;
        }
      });

      // DeviceMotionEvent: integrate gyroscope for heading - immune to magnetometer instability
      window.addEventListener('devicemotion', (event) => {
        const now = Date.now();
        if (lastMotionTime !== null && event.rotationRate) {
          const dt = (now - lastMotionTime) / 1000;
          // rotationRate.gamma = rotation around device Y axis = yaw when phone held upright
          headingDeg -= event.rotationRate.gamma * dt;
          if (headingDeg > 180) headingDeg -= 360;
          if (headingDeg < -180) headingDeg += 360;
        }
        lastMotionTime = now;

        if (now - lastUpdate < throttleDelay) return;
        lastUpdate = now;

        const data = {
          alpha: headingDeg.toFixed(1),
          beta: currentBeta.toFixed(1),
          gamma: '0'
        };

        socket.emit('motion-data', data);
        dataDiv.textContent = 'heading: ' + data.alpha + 'deg  tilt: ' + data.beta + 'deg';

        if (cameraRig) {
          const targetRotation = { x: currentBeta, y: headingDeg, z: 0 };
          currentRotation.x += (targetRotation.x - currentRotation.x) * smoothingFactor;
          currentRotation.y += (targetRotation.y - currentRotation.y) * smoothingFactor;
          currentRotation.z = 0;
          cameraRig.setAttribute('rotation', currentRotation);
        }
      });

      // Add raycasting for tap-to-select
      setupRaycasting();
    }

    function setupRaycasting() {
      // Listen for clicks on clickable objects
      const clickables = document.querySelectorAll('.clickable');
      
      clickables.forEach(obj => {
        obj.addEventListener('click', (evt) => {
          highlightObject(obj.id);
        });
      });
    }

    function highlightObject(objectId) {
      socket.emit('highlight', { object: objectId });
      
      // Highlight on expert's own screen
      const object = document.querySelector(`#${objectId}`);
      if (object) {
        // Reset all objects to their original colors first
        document.querySelectorAll('.clickable').forEach(obj => {
          const id = obj.getAttribute('id');
          if (id === 'box') obj.setAttribute('color', '#4CC3D9');
          if (id === 'cylinder') obj.setAttribute('color', '#FFC65D');
          if (id === 'sphere') obj.setAttribute('color', '#EF2D5E');
        });
        
        // Highlight the selected object
        object.setAttribute('color', '#FFFF00'); // Yellow highlight
        status.textContent = `Highlighted ${objectId}`;
      }
      
      setTimeout(() => {
        status.textContent = 'Streaming motion data...';
      }, 1000);
    }
  </script>
</body>
</html>
