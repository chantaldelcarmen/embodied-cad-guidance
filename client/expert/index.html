<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Expert</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    a-scene { width: 100vw; height: 100vh; }

    /* Status pill — top center */
    #status {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
      color: white;
      background: #555;
      z-index: 1000;
      pointer-events: none;
      transition: background 0.3s;
      white-space: nowrap;
    }

    /* Toast — transient feedback */
    #toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 56px);
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 22px;
      border-radius: 20px;
      color: white;
      font-size: 15px;
      font-weight: bold;
      z-index: 1001;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Explode button — bottom center floating */
    #bottom-controls {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 32px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: none;
    }
    #explodeBtn {
      padding: 14px 32px;
      background: #FF8C00;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      -webkit-tap-highlight-color: transparent;
    }
    #explodeBtn:active { opacity: 0.8; }

    /* Hints overlay — bottom of screen */
    #hints-overlay {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 100px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #hints-overlay.visible { display: flex; }
    .hint-pill {
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 8px 14px 8px 18px;
      border-radius: 20px;
      font-size: 14px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hint-pill.dismissed { display: none; }
    .hint-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.55);
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    /* Part highlight buttons — left side vertical column */
    #part-controls {
      position: fixed;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }
    #part-controls.visible { display: flex; }
    .part-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .part-btn.active { background: #FFFF00; color: black; }
    .part-btn:active { opacity: 0.7; }

    /* Orbit D-pad — bottom right, shown when locked */
    #orbit-controls {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      right: 16px;
      display: none;
      grid-template-areas: ". up ." "left . right" ". down .";
      grid-template-columns: 50px 50px 50px;
      grid-template-rows: 50px 50px 50px;
      gap: 4px;
      z-index: 1001;
    }
    #orbit-controls.visible { display: grid; }
    .orbit-btn {
      width: 50px; height: 50px;
      border-radius: 12px; border: none;
      background: rgba(0,0,0,0.45); color: white;
      font-size: 20px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .orbit-btn:active { background: rgba(239,45,94,0.6); }
    #orbit-up    { grid-area: up; }
    #orbit-left  { grid-area: left; }
    #orbit-right { grid-area: right; }
    #orbit-down  { grid-area: down; }

    /* Help button — top right */
    #hints-btn {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 8px);
      right: 12px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.4);
      color: white;
      font-size: 16px;
      cursor: pointer;
      z-index: 1001;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <a-scene id="scene" vr-mode-ui="enabled: false">
    <a-sky color="#87CEEB"></a-sky>
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" position="-1 1 1" intensity="0.7"></a-light>

    <a-entity id="camera-rig" position="0 1.6 0">
      <a-camera position="0 0 0">
        <a-cursor raycaster="objects: .clickable" fuse="false" color="white" opacity="0.5"></a-cursor>
      </a-camera>
    </a-entity>

    <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
    <a-entity id="engine" gltf-model="url(/assets/engine.glb)" position="-0.010 1.550 -3" scale="0.010 0.010 0.010" rotation="0 0 0" class="clickable"></a-entity>
  </a-scene>

  <!-- Start overlay -->
  <div id="start-overlay" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); display: flex; align-items: center;
    justify-content: center; z-index: 2000;">
    <div style="text-align: center;">
      <div style="color: white; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; margin-bottom: 8px;">Expert</div>
      <div style="color: white; font-size: 20px; font-weight: bold; margin-bottom: 6px;">Motion Controller</div>
      <div style="color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 28px;">Point your phone to guide the viewer</div>
      <button id="startBtn" style="
        padding: 20px 40px; font-size: 24px; background: #4CC3D9;
        color: white; border: none; border-radius: 12px; cursor: pointer;">
        Start
      </button>
    </div>
  </div>

  <div id="status">Ready</div>
  <div id="toast"></div>

  <div id="hints-overlay">
    <div class="hint-pill">👆 Tap engine or part to highlight <button class="hint-close" onclick="dismissHint(this)">×</button></div>
    <div class="hint-pill">👇 Swipe down to lock / unlock view <button class="hint-close" onclick="dismissHint(this)">×</button></div>
    <div class="hint-pill">🔒 When locked: tilt to scrub, arrows to orbit <button class="hint-close" onclick="dismissHint(this)">×</button></div>
    <div class="hint-pill">🤏 Pinch to zoom <button class="hint-close" onclick="dismissHint(this)">×</button></div>
  </div>

  <button id="hints-btn" onclick="showHints()">?</button>

  <div id="orbit-controls">
    <button class="orbit-btn" id="orbit-up">▲</button>
    <button class="orbit-btn" id="orbit-left">◄</button>
    <button class="orbit-btn" id="orbit-right">►</button>
    <button class="orbit-btn" id="orbit-down">▼</button>
  </div>

  <div id="part-controls">
    <button class="part-btn" data-part="pistons">Pistons</button>
    <button class="part-btn" data-part="lids">Lids</button>
    <button class="part-btn" data-part="rings">Rings</button>
    <button class="part-btn" data-part="plates">Plates</button>
    <button class="part-btn" data-part="bolts">Bolts</button>
    <button class="part-btn" data-part="housing">Housing</button>
  </div>

  <div id="bottom-controls">
    <button id="explodeBtn" onclick="toggleExplode()">💥 Explode</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const THREE = AFRAME.THREE;

    // --- Audio ---
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playHighlightSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
    }
    function playExplodeSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
    }
    function playAssembleSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
    }
    function playSnapSound() {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.25);
    }

    // --- UI helpers ---
    const statusEl = document.getElementById('status');
    const toastEl = document.getElementById('toast');
    let toastTimer = null;

    function setStatus(message, type = 'default') {
      const colors = { default: '#555', streaming: '#4CC3D9', locked: '#EF2D5E', warning: '#FF8C00' };
      statusEl.textContent = message;
      statusEl.style.background = colors[type] || colors.default;
    }

    function showToast(message, color = '#333', duration = 2000) {
      toastEl.textContent = message;
      toastEl.style.background = color;
      toastEl.style.opacity = '1';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toastEl.style.opacity = '0'; }, duration);
    }

    // --- Hints ---
    function showHints() {
      const overlay = document.getElementById('hints-overlay');
      overlay.querySelectorAll('.hint-pill').forEach(p => p.classList.remove('dismissed'));
      overlay.classList.add('visible');
    }

    function dismissHint(closeBtn) {
      closeBtn.closest('.hint-pill').classList.add('dismissed');
      const overlay = document.getElementById('hints-overlay');
      const anyVisible = [...overlay.querySelectorAll('.hint-pill')].some(p => !p.classList.contains('dismissed'));
      if (!anyVisible) overlay.classList.remove('visible');
    }

    // --- State ---
    let cameraRig = null;
    let currentHeading = 0;
    let currentTilt = 0;
    let viewLocked = false;
    let clipDuration = null;

    document.addEventListener('DOMContentLoaded', () => {
      const scene = document.querySelector('a-scene');
      const init = () => { cameraRig = document.getElementById('camera-rig'); };
      if (scene.hasLoaded) init(); else scene.addEventListener('loaded', init);

      const engine = document.querySelector('#engine');
      engine.addEventListener('model-loaded', () => {
        const clips = engine.object3D.animations;
        if (clips && clips.length > 0) clipDuration = clips[0].duration;
        const meshNames = [];
        engine.object3D.traverse(node => { if (node.isMesh) meshNames.push(node.name); });
        console.log('Mesh names:', JSON.stringify(meshNames));
      });
      engine.addEventListener('animation-finished', () => {
        const btn = document.getElementById('explodeBtn');
        btn.disabled = false;
        btn.style.background = '#FF8C00';
      });
    });

    // --- Start ---
    document.getElementById('startBtn').addEventListener('click', async () => {
      getAudioCtx();
      try {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          const op = await DeviceOrientationEvent.requestPermission();
          if (op !== 'granted') { setStatus('Permission denied', 'warning'); return; }
        }
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
          const mp = await DeviceMotionEvent.requestPermission();
          if (mp !== 'granted') { setStatus('Permission denied', 'warning'); return; }
        }
        startListening();
      } catch (err) {
        setStatus('Error: ' + err.message, 'warning');
      }
    });

    function startListening() {
      document.getElementById('start-overlay').style.display = 'none';
      document.getElementById('bottom-controls').style.display = 'block';
      document.getElementById('part-controls').classList.add('visible');
      document.getElementById('hints-btn').style.display = 'block';
      setStatus('Streaming', 'streaming');
      showHints();

      let lastUpdate = 0;
      const throttleDelay = 50;
      let currentRotation = { x: 0, y: 0, z: 0 };
      const smoothingFactor = 0.3;
      let headingDeg = null;
      let lastMotionTime = null;
      let magHeading = null;
      let initialAlpha = null;
      const MAG_CORRECTION = 0.02;
      const MAG_FREEZE_THRESHOLD = 8;
      let currentBeta = 0;
      let initialBeta = null;

      window.addEventListener('deviceorientation', (event) => {
        if (initialBeta === null && event.beta !== null) {
          initialBeta = event.beta;
          initialAlpha = event.alpha || 0;
        }
        if (initialBeta !== null) {
          currentBeta = (event.beta || 0) - initialBeta;
          if (currentBeta > 80) currentBeta = 80;
          if (currentBeta < -80) currentBeta = -80;
          let rawMag = (event.alpha || 0) - initialAlpha;
          if (rawMag > 180) rawMag -= 360;
          if (rawMag < -180) rawMag += 360;
          magHeading = rawMag;
        }
      });

      window.addEventListener('devicemotion', (event) => {
        const now = Date.now();
        if (lastMotionTime !== null && event.rotationRate) {
          const dt = (now - lastMotionTime) / 1000;
          if (headingDeg === null) headingDeg = magHeading || 0;
          headingDeg -= event.rotationRate.gamma * dt;
          if (headingDeg > 180) headingDeg -= 360;
          if (headingDeg < -180) headingDeg += 360;
          if (magHeading !== null && currentBeta <= MAG_FREEZE_THRESHOLD) {
            let magDelta = magHeading - headingDeg;
            if (magDelta > 180) magDelta -= 360;
            if (magDelta < -180) magDelta += 360;
            headingDeg += magDelta * MAG_CORRECTION;
          }
        }
        lastMotionTime = now;
        currentHeading = headingDeg || 0;
        currentTilt = currentBeta;

        if (now - lastUpdate < throttleDelay) return;
        if (viewLocked) {
          const scrubValue = Math.max(0, Math.min(1, -currentBeta / 45));
          scrubAnimation(scrubValue);
          socket.emit('scrub-animation', { t: scrubValue });
          lastUpdate = now;
          return;
        }
        lastUpdate = now;

        if (headingDeg === null) return;
        const rigPos = cameraRig ? cameraRig.getAttribute('position') : { x: 0, y: 1.6, z: 0 };
        socket.emit('motion-data', {
          alpha: headingDeg.toFixed(1),
          beta: currentBeta.toFixed(1),
          gamma: '0',
          rigX: rigPos.x.toFixed(3),
          rigY: rigPos.y.toFixed(3),
          rigZ: rigPos.z.toFixed(3)
        });

        if (cameraRig) {
          const targetRotation = { x: currentBeta, y: headingDeg, z: 0 };
          currentRotation.x += (targetRotation.x - currentRotation.x) * smoothingFactor;
          currentRotation.y += (targetRotation.y - currentRotation.y) * smoothingFactor;
          currentRotation.z = 0;
          cameraRig.setAttribute('rotation', currentRotation);
        }
      });

      setupRaycasting();
      setupDoubleTap();
    }

    // --- Swipe down to lock/unlock ---
    function setupDoubleTap() {
      let startY = null;
      let startX = null;

      document.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          startY = e.touches[0].clientY;
          startX = e.touches[0].clientX;
        } else {
          startY = null;
        }
      }, { passive: true });

      document.addEventListener('touchend', (e) => {
        if (startY === null) return;
        const dy = e.changedTouches[0].clientY - startY;
        const dx = Math.abs(e.changedTouches[0].clientX - startX);
        startY = null;
        if (dy > 80 && dx < 60) lockView();
      }, { passive: true });
    }

    function lockView() {
      viewLocked = !viewLocked;
      const camera = document.querySelector('a-camera');
      if (viewLocked) {
        const rigPos = cameraRig ? cameraRig.getAttribute('position') : { x: 0, y: 1.6, z: 0 };
        socket.emit('snap-view', { x: currentTilt, y: currentHeading, z: 0, rigX: rigPos.x, rigY: rigPos.y, rigZ: rigPos.z });
        navigator.vibrate && navigator.vibrate([150, 60, 150, 60, 150]);
        playSnapSound();
        setStatus('📌 Locked', 'locked');
        showToast('📌 View locked — tilt to scrub', '#EF2D5E');
        if (camera) camera.setAttribute('look-controls', 'enabled', false);
        document.getElementById('explodeBtn').style.display = 'none';
        initOrbitFromCamera();
        document.getElementById('orbit-controls').classList.add('visible');
      } else {
        socket.emit('unlock-view');
        setStatus('Streaming', 'streaming');
        showToast('🔓 Unlocked', '#555');
        if (camera) camera.setAttribute('look-controls', 'enabled', true);
        document.getElementById('explodeBtn').style.display = 'block';
        stopOrbit();
        document.getElementById('orbit-controls').classList.remove('visible');
      }
    }

    // --- Highlight ---
    let currentHighlight = null;

    const PART_GROUPS = {
      pistons:  ['Piston'],
      lids:     ['Lid'],
      rings:    ['Ring'],
      plates:   ['Plate'],
      bolts:    ['Bolt', 'Nut'],
      housing:  ['polySurface'],
    };

    function meshMatchesPart(meshName, partKey) {
      return PART_GROUPS[partKey].some(prefix => meshName.startsWith(prefix));
    }

    function resetAllHighlights() {
      const engine = document.querySelector('#engine');
      if (!engine) return;
      engine.object3D.traverse(node => {
        if (node.isMesh && node.userData.originalColor) node.material.color.copy(node.userData.originalColor);
      });
      document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
    }

    let suppressNextClick = false;

    function setupRaycasting() {
      document.querySelectorAll('.clickable').forEach(obj => {
        obj.addEventListener('click', () => highlightObject(obj.id));
      });
      document.querySelectorAll('.part-btn').forEach(btn => {
        btn.addEventListener('click', () => highlightPart(btn.dataset.part));
      });

      // Touch-to-highlight: tap directly on a part in the scene
      let tapStart = null;
      const sceneEl = document.querySelector('#scene');
      sceneEl.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) { tapStart = null; return; }
        tapStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }, { passive: true });
      sceneEl.addEventListener('touchend', (e) => {
        if (!tapStart || e.changedTouches.length !== 1) return;
        const dx = Math.abs(e.changedTouches[0].clientX - tapStart.x);
        const dy = Math.abs(e.changedTouches[0].clientY - tapStart.y);
        tapStart = null;
        if (dx > 20 || dy > 20) return; // swipe, not a tap

        const touch = e.changedTouches[0];
        const canvas = sceneEl.canvas;
        const rect = canvas.getBoundingClientRect();
        const nx = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
        const ny = -((touch.clientY - rect.top) / rect.height) * 2 + 1;

        const cameraObj = document.querySelector('[camera]').getObject3D('camera');
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera({ x: nx, y: ny }, cameraObj);

        const engine = document.querySelector('#engine');
        if (!engine) return;
        const meshes = [];
        engine.object3D.traverse(node => { if (node.isMesh) meshes.push(node); });

        const hits = raycaster.intersectObjects(meshes, false);
        if (hits.length > 0) {
          const partKey = Object.keys(PART_GROUPS).find(k => meshMatchesPart(hits[0].object.name, k));
          if (partKey) {
            suppressNextClick = true;
            highlightPart(partKey);
          }
        }
      }, { passive: true });
    }

    function highlightObject(objectId) {
      if (suppressNextClick) { suppressNextClick = false; return; }
      resetAllHighlights();
      if (currentHighlight === objectId) {
        currentHighlight = null;
        socket.emit('highlight', { object: null });
        navigator.vibrate && navigator.vibrate(120);
        showToast('Highlight cleared', '#555', 1500);
      } else {
        currentHighlight = objectId;
        socket.emit('highlight', { object: objectId });
        navigator.vibrate && navigator.vibrate(200);
        playHighlightSound();
        const object = document.querySelector(`#${objectId}`);
        if (object) {
          object.object3D.traverse(node => {
            if (node.isMesh) {
              if (!node.userData.originalColor) node.userData.originalColor = node.material.color.clone();
              node.material = node.material.clone();
              node.material.color.set('#FFFF00');
            }
          });
          showToast(`Highlighted`, '#4CC3D9', 1500);
        }
      }
    }

    function highlightPart(partKey) {
      resetAllHighlights();
      if (currentHighlight === partKey) {
        currentHighlight = null;
        socket.emit('highlight', { part: null });
        navigator.vibrate && navigator.vibrate(120);
        showToast('Highlight cleared', '#555', 1500);
        return;
      }
      currentHighlight = partKey;
      socket.emit('highlight', { part: partKey });
      navigator.vibrate && navigator.vibrate(200);
      playHighlightSound();
      const engine = document.querySelector('#engine');
      if (engine) {
        engine.object3D.traverse(node => {
          if (node.isMesh && meshMatchesPart(node.name, partKey)) {
            if (!node.userData.originalColor) node.userData.originalColor = node.material.color.clone();
            node.material = node.material.clone();
            node.material.color.set('#FFFF00');
          }
        });
      }
      const btn = document.querySelector(`.part-btn[data-part="${partKey}"]`);
      if (btn) btn.classList.add('active');
      showToast(`Highlighted: ${partKey}`, '#4CC3D9', 1500);
    }

    // --- Explode ---
    function toggleExplode() {
      const btn = document.getElementById('explodeBtn');
      btn.disabled = true;
      btn.style.background = '#888';
      socket.emit('explode-view');
      navigator.vibrate && navigator.vibrate([100, 40, 100, 40, 200]);
      playExplodeSound();
      playAnimation(true);
    }

    function playAnimation(forward) {
      const engine = document.querySelector('#engine');
      if (!engine) return;
      engine.removeAttribute('animation-mixer');
      setTimeout(() => {
        if (forward) {
          engine.setAttribute('animation-mixer', 'clip: Take 001; loop: once; clampWhenFinished: true; timeScale: 1');
        } else {
          const dur = clipDuration || 2;
          engine.setAttribute('animation-mixer', `clip: Take 001; loop: once; clampWhenFinished: true; timeScale: -1; startAt: ${dur}`);
        }
      }, 50);
    }

    // --- Scrub animation ---
    function scrubAnimation(normalized) {
      const engine = document.querySelector('#engine');
      if (!engine) return;
      const dur = clipDuration || 2;
      if (!engine.getAttribute('animation-mixer')) {
        engine.setAttribute('animation-mixer', 'clip: Take 001; loop: once; clampWhenFinished: true');
      }
      const comp = engine.components['animation-mixer'];
      if (!comp || !comp.mixer) return;
      comp.mixer._actions.forEach(action => {
        action.paused = true;
        action.time = Math.max(0, Math.min(normalized * dur, dur));
      });
      comp.mixer.update(0);
    }

    // --- Pinch to zoom ---
    let lastPinchDist = null;

    function getPinchDist(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function moveForward(amount) {
      if (!cameraRig) return;
      const pos = cameraRig.getAttribute('position');
      const yaw = THREE.MathUtils.degToRad(currentHeading);
      cameraRig.setAttribute('position', {
        x: pos.x - Math.sin(yaw) * amount,
        y: pos.y,
        z: pos.z - Math.cos(yaw) * amount
      });
    }

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) lastPinchDist = getPinchDist(e.touches);
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && lastPinchDist !== null) {
        e.preventDefault();
        const dist = getPinchDist(e.touches);
        const delta = dist - lastPinchDist;
        lastPinchDist = dist;
        moveForward(delta * 0.008);
        if (cameraRig) {
          const rigPos = cameraRig.getAttribute('position');
          if (viewLocked) {
            socket.emit('view-update', { rigX: rigPos.x, rigY: rigPos.y, rigZ: rigPos.z });
          } else {
            socket.emit('motion-data', {
              alpha: currentHeading.toFixed(1),
              beta: currentTilt.toFixed(1),
              gamma: '0',
              rigX: rigPos.x.toFixed(3),
              rigY: rigPos.y.toFixed(3),
              rigZ: rigPos.z.toFixed(3)
            });
          }
        }
      }
    }, { passive: false });

    document.addEventListener('touchend', () => { lastPinchDist = null; });

    // --- Orbit controls (shown when locked) ---
    const MODEL_CENTER = { x: -0.010, y: 1.550, z: -3 };
    let orbitAngle = 0, orbitElevation = 15, orbitRadius = 3, orbitRaf = null;

    function initOrbitFromCamera() {
      if (!cameraRig) return;
      const pos = cameraRig.getAttribute('position');
      const dx = pos.x - MODEL_CENTER.x;
      const dy = pos.y - MODEL_CENTER.y;
      const dz = pos.z - MODEL_CENTER.z;
      orbitRadius = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (orbitRadius < 0.5) orbitRadius = 3;
      orbitAngle = THREE.MathUtils.radToDeg(Math.atan2(dx, dz));
      orbitElevation = THREE.MathUtils.radToDeg(Math.asin(Math.max(-1, Math.min(1, dy / orbitRadius))));
    }

    function updateOrbitCamera() {
      if (!cameraRig) return;
      const phi = THREE.MathUtils.degToRad(orbitAngle);
      const theta = THREE.MathUtils.degToRad(orbitElevation);
      const cosTheta = Math.cos(theta);
      const x = MODEL_CENTER.x + orbitRadius * Math.sin(phi) * cosTheta;
      const y = MODEL_CENTER.y + orbitRadius * Math.sin(theta);
      const z = MODEL_CENTER.z + orbitRadius * Math.cos(phi) * cosTheta;
      cameraRig.setAttribute('position', { x, y, z });
      const dist2d = Math.sqrt((MODEL_CENTER.x - x) ** 2 + (MODEL_CENTER.z - z) ** 2);
      const yawRad = Math.atan2(MODEL_CENTER.x - x, z - MODEL_CENTER.z);
      const pitchRad = Math.atan2(MODEL_CENTER.y - y, dist2d);
      cameraRig.object3D.rotation.order = 'YXZ';
      cameraRig.object3D.rotation.set(pitchRad, yawRad, 0);
      socket.emit('view-update', {
        rigX: x, rigY: y, rigZ: z,
        rotX: THREE.MathUtils.radToDeg(pitchRad),
        rotY: THREE.MathUtils.radToDeg(yawRad)
      });
    }

    function startOrbit(direction) {
      stopOrbit();
      const step = () => {
        switch (direction) {
          case 'left':  orbitAngle -= 1.5; break;
          case 'right': orbitAngle += 1.5; break;
          case 'up':    orbitElevation = Math.min(orbitElevation + 1.5, 80); break;
          case 'down':  orbitElevation = Math.max(orbitElevation - 1.5, -20); break;
        }
        updateOrbitCamera();
        orbitRaf = requestAnimationFrame(step);
      };
      orbitRaf = requestAnimationFrame(step);
    }

    function stopOrbit() {
      if (orbitRaf) { cancelAnimationFrame(orbitRaf); orbitRaf = null; }
    }

    ['left', 'right', 'up', 'down'].forEach(dir => {
      const btn = document.getElementById('orbit-' + dir);
      btn.addEventListener('touchstart', (e) => { e.stopPropagation(); startOrbit(dir); }, { passive: true });
      btn.addEventListener('touchend',   (e) => { e.stopPropagation(); stopOrbit(); }, { passive: true });
      btn.addEventListener('touchcancel', stopOrbit, { passive: true });
      btn.addEventListener('mousedown', () => startOrbit(dir));
      btn.addEventListener('mouseup', stopOrbit);
      btn.addEventListener('mouseleave', stopOrbit);
    });
  </script>
</body>
</html>
